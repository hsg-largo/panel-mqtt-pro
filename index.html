<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIoT Dashboard — Control Industrial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════════════════════════════════
     * RESET & TOKENS
     * ══════════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080a0f;
      --bg2:         #0d1018;
      --surface:     #111520;
      --surface2:    #171c2b;
      --surface3:    #1d2235;
      --border:      rgba(255,255,255,0.06);
      --border2:     rgba(255,255,255,0.11);

      --text:        #dde2ee;
      --text-muted:  #5a6278;
      --text-dim:    #3d4460;

      --accent:      #3d7eff;
      --accent-glow: rgba(61,126,255,0.18);
      --green:       #2dd4a0;
      --green-glow:  rgba(45,212,160,0.15);
      --red:         #f05c5c;
      --red-glow:    rgba(240,92,92,0.15);
      --amber:       #f5a623;

      --radius-sm:   6px;
      --radius:      10px;
      --radius-lg:   14px;

      --font-ui:     'IBM Plex Sans', sans-serif;
      --font-mono:   'IBM Plex Mono', monospace;

      --transition:  0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════════════════════════════════════════
     * PANTALLA DE LOGIN
     * ══════════════════════════════════════════════════════════════════════ */
    #login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 100;
      /* Patrón de fondo tipo grid industrial */
      background-image:
        linear-gradient(rgba(61,126,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,126,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #login-screen.hidden {
      animation: fadeOut 0.3s ease forwards;
      pointer-events: none;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(1.015); }
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 0 24px;
      animation: fadeInUp 0.5s cubic-bezier(0.2,0,0,1) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo en el login */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .login-logo-mark {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, #7b5cf5 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(61,126,255,0.3);
    }

    .login-logo-mark svg { width: 20px; height: 20px; }

    .login-logo-text {
      display: flex;
      flex-direction: column;
    }

    .login-logo-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .login-logo-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* Panel del formulario */
    .login-panel {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(61,126,255,0.06);
    }

    .login-heading {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* Campos */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: var(--font-mono);
    }

    .field-input-wrap {
      position: relative;
    }

    .field-input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.35;
      pointer-events: none;
      width: 16px;
      height: 16px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field input::placeholder { color: var(--text-dim); }

    /* Error de login */
    .login-error {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--red-glow);
      border: 1px solid rgba(240,92,92,0.25);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .login-error.visible { display: flex; }

    /* Botón de acceso */
    .btn-login {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background var(--transition), box-shadow var(--transition), transform 0.1s;
      box-shadow: 0 4px 20px rgba(61,126,255,0.25);
    }

    .btn-login:hover {
      background: #5a8fff;
      box-shadow: 0 4px 28px rgba(61,126,255,0.4);
    }

    .btn-login:active { transform: scale(0.98); }

    /* ══════════════════════════════════════════════════════════════════════════
     * DASHBOARD (oculto hasta autenticar)
     * ══════════════════════════════════════════════════════════════════════ */
    #dashboard {
      display: none;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      padding: 0 24px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    #dashboard.visible {
      display: grid;
      animation: fadeInUp 0.4s cubic-bezier(0.2,0,0,1) both;
    }

    /* ══════════════════════════════════════════════════════════════════════════
     * HEADER
     * ══════════════════════════════════════════════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #7b5cf5 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(61,126,255,0.22);
    }

    .logo-mark svg { width: 18px; height: 18px; }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* Zona derecha del header: status + sesión */
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Badge de conexión */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .status-dot.connected {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .status-dot.disconnected {
      background: var(--red);
      animation: pulse-red 1.5s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* Chip de sesión (usuario + rol) */
    .session-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 6px 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .session-username {
      color: var(--text);
      font-weight: 500;
    }

    .role-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .role-badge.admin {
      background: rgba(61,126,255,0.12);
      color: var(--accent);
      border: 1px solid rgba(61,126,255,0.22);
    }

    .role-badge.viewer {
      background: rgba(90,98,120,0.18);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* Botón cerrar sesión */
    .btn-logout {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-logout:hover {
      background: var(--red-glow);
      color: var(--red);
      border-color: rgba(240,92,92,0.25);
    }

    /* ══════════════════════════════════════════════════════════════════════════
     * SEPARADORES DE SECCIÓN
     * ══════════════════════════════════════════════════════════════════════ */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-label-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      font-family: var(--font-mono);
    }

    .section-label-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ══════════════════════════════════════════════════════════════════════════
     * PANEL DE ACTUADORES
     * ══════════════════════════════════════════════════════════════════════ */
    #actuator-section {
      margin-bottom: 32px;
    }

    /* Bloque de acceso restringido (visible para rol viewer) */
    #actuator-locked {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 13px;
    }

    #actuator-locked svg {
      opacity: 0.4;
      flex-shrink: 0;
    }

    .actuator-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .actuator-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-top: 2px solid transparent;
      transition: border-top-color var(--transition), box-shadow var(--transition);
    }

    .actuator-card.is-on {
      border-top-color: var(--green);
      box-shadow: 0 0 24px var(--green-glow);
    }

    .actuator-meta { display: flex; flex-direction: column; gap: 3px; }

    .actuator-topic {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .actuator-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .actuator-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      width: fit-content;
      transition: background var(--transition), color var(--transition);
    }

    .actuator-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .actuator-status.off {
      background: var(--red-glow);
      color: var(--red);
      border: 1px solid rgba(240,92,92,0.2);
    }

    .actuator-status.on {
      background: var(--green-glow);
      color: var(--green);
      border: 1px solid rgba(45,212,160,0.22);
    }

    .actuator-btns { display: flex; gap: 8px; }

    .btn-act {
      flex: 1;
      padding: 9px 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), transform 0.1s;
    }

    .btn-on {
      background: rgba(45,212,160,0.06);
      color: var(--green);
      border-color: rgba(45,212,160,0.2);
    }

    .btn-on:hover  { background: rgba(45,212,160,0.14); }

    .btn-off {
      background: rgba(240,92,92,0.06);
      color: var(--red);
      border-color: rgba(240,92,92,0.2);
    }

    .btn-off:hover { background: rgba(240,92,92,0.14); }

    .btn-act:active   { transform: scale(0.97); }
    .btn-act:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ══════════════════════════════════════════════════════════════════════════
     * GRÁFICAS DE SENSORES
     * ══════════════════════════════════════════════════════════════════════ */
    #charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .sensor-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition);
    }

    .sensor-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .sensor-card.active::before { opacity: 1; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-family: var(--font-mono);
    }

    .card-stats { display: flex; gap: 6px; align-items: center; }

    .stat-chip {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      min-width: 72px;
      text-align: right;
    }

    .fps-chip { color: var(--green); min-width: 56px; }

    .sensor-canvas {
      display: block;
      width: 100%;
      height: 180px;
      border-radius: var(--radius-sm);
      background: var(--bg2);
    }

    .axis-labels {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
      padding: 0 2px;
    }

    .axis-y-max, .axis-y-min, .axis-x-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ══════════════════════════════════════════════════════════════════════════
     * SCROLLBAR
     * ══════════════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ══════════════════════════════════════════════════════════════════════════
     * LIGHT MODE
     * ══════════════════════════════════════════════════════════════════════ */
    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f0f2f7;
        --bg2:        #e8ebf2;
        --surface:    #ffffff;
        --surface2:   #f4f5fa;
        --surface3:   #eceef5;
        --border:     rgba(0,0,0,0.07);
        --border2:    rgba(0,0,0,0.12);
        --text:       #111827;
        --text-muted: #6b7280;
        --text-dim:   #9ca3af;
      }
      .sensor-canvas { background: #eef0f7; }
      #login-screen {
        background-image:
          linear-gradient(rgba(61,126,255,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(61,126,255,0.04) 1px, transparent 1px);
      }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════════════════════
       PANTALLA DE LOGIN
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="login-screen" role="main" aria-label="Acceso al sistema">
    <div class="login-box">

      <div class="login-logo">
        <div class="login-logo-mark" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="1,14 5,8 9,11 13,4 19,4"
                      stroke="white" stroke-width="1.8"
                      stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="login-logo-text">
          <span class="login-logo-title">IIoT Dashboard</span>
          <span class="login-logo-sub">Control Industrial · ESP32</span>
        </div>
      </div>

      <div class="login-panel">
        <h1 class="login-heading">Acceso al sistema</h1>
        <p class="login-sub">Ingresa tus credenciales para continuar.</p>

        <div class="login-error" id="login-error" role="alert" aria-live="polite">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
            <line x1="8" y1="5" x2="8" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="8" cy="11" r="0.8" fill="currentColor"/>
          </svg>
          <span id="login-error-text">Credenciales incorrectas.</span>
        </div>

        <div class="field">
          <label for="input-username">Usuario</label>
          <div class="field-input-wrap">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="8" cy="5.5" r="2.5"/><path d="M2.5 13.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/>
            </svg>
            <input type="text" id="input-username" autocomplete="username"
                   placeholder="nombre de usuario" spellcheck="false">
          </div>
        </div>

        <div class="field">
          <label for="input-password">Contraseña</label>
          <div class="field-input-wrap">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="7" width="10" height="7" rx="1.5"/>
              <path d="M5.5 7V5a2.5 2.5 0 015 0v2"/>
            </svg>
            <input type="password" id="input-password" autocomplete="current-password"
                   placeholder="contraseña">
          </div>
        </div>

        <button class="btn-login" id="btn-login">Iniciar sesión</button>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════════
       DASHBOARD PRINCIPAL
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="dashboard" aria-label="Dashboard IIoT">

    <header>
      <div class="header-left">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="1,14 5,8 9,11 13,4 19,4"
                      stroke="white" stroke-width="1.8"
                      stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="header-title">IIoT Dashboard</div>
          <div class="header-subtitle">Telemetría &amp; Control · ESP32</div>
        </div>
      </div>

      <div class="header-right">
        <!-- Indicador de conexión al broker -->
        <div class="status-bar" role="status" aria-live="polite">
          <span class="status-dot disconnected" id="status-badge"></span>
          <span id="status-text">Conectando…</span>
        </div>

        <!-- Chip de sesión activa -->
        <div class="session-chip">
          <span class="session-username" id="session-username">—</span>
          <span class="role-badge" id="session-role">—</span>
          <button class="btn-logout" id="btn-logout" title="Cerrar sesión">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M4.5 6h5M7.5 4L9.5 6l-2 2"/>
              <path d="M7 1.5H2a.5.5 0 00-.5.5v8a.5.5 0 00.5.5h5"/>
            </svg>
            Salir
          </button>
        </div>
      </div>
    </header>

    <main>

      <!-- Sección actuadores -->
      <section id="actuator-section" aria-label="Control de actuadores">
        <div class="section-label">
          <span class="section-label-text">Actuadores — ESP32 #2</span>
          <span class="section-label-line" aria-hidden="true"></span>
        </div>
        <!-- Mensaje para viewers sin acceso -->
        <div id="actuator-locked" role="status">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="9" width="12" height="9" rx="2"/>
            <path d="M7 9V6a3 3 0 016 0v3"/>
          </svg>
          <span>Control de actuadores disponible solo para administradores.</span>
        </div>
        <!-- Tarjetas de GPIO (solo admin) -->
        <div class="actuator-grid" id="actuator-grid"></div>
      </section>

      <!-- Sección sensores -->
      <section aria-label="Telemetría analógica">
        <div class="section-label">
          <span class="section-label-text">Sensores ADC — ESP32 #1</span>
          <span class="section-label-line" aria-hidden="true"></span>
        </div>
        <div id="charts-grid"></div>
      </section>

    </main>
  </div>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
